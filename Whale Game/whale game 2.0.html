<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Defender</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Custom CSS for a deep-sea theme with a surface threat */
        :root {
            --sea-blue-dark: #000a12; /* Deeper black-blue for maximum depth */
            --sea-blue-mid: #143542; /* Deep ocean blue */
            --flare-orange: #ff6600; /* More reddish-orange for realism */
            --whale-color: #457b9d; /* Muted blue for the whale */
            --whale-color-dark: #3a6b8c; /* Darker shade for whale details */
            --text-light: #f1faee;
            --ui-accent: #e63946; /* Emergency red */
            --seabed-color: #2a1a1f; 
            --sky-blue: #a8dadc; 
            --caustics-light: rgba(255, 255, 255, 0.15); /* Subtle light color */
            --buy-color: #4CAF50; /* Green for buying */
            --max-level-color: #555;
            --coin-color: #ffd700; /* Gold for currency */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--sea-blue-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            color: var(--text-light);
            text-shadow: 0 0 15px rgba(69, 123, 157, 0.7);
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 650px; /* Slightly wider */
            height: 450px; /* Slightly taller */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid var(--sea-blue-mid);
            background-color: var(--sea-blue-dark); /* Ensure canvas background matches */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.6rem;
            font-weight: 700;
            padding: 8px 20px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            border: 3px solid var(--flare-orange);
            text-shadow: 1px 1px 5px var(--flare-orange);
        }

        /* --- Shop Button & Total Score Container --- */
        #top-ui-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        #total-score-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 12px;
            border: 2px solid var(--coin-color);
        }
        
        .coin-icon {
            color: var(--coin-color);
            font-size: 1.5rem;
            text-shadow: 0 0 5px var(--coin-color);
            line-height: 1;
        }

        #total-score-display {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--coin-color);
            text-shadow: 0 0 8px var(--coin-color);
        }

        /* --- Modals (Game Over/Shop) --- */

        #message-box, #shop-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px 5px rgba(255, 153, 0, 1); 
            transition: opacity 0.5s ease;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            z-index: 10;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }

        #message-box.visible, #shop-modal.visible {
            opacity: 1;
            visibility: visible;
        }

        #final-score {
            font-size: 3rem;
            color: var(--flare-orange);
            margin: 10px 0 25px 0;
            text-shadow: 0 0 10px var(--flare-orange);
        }

        /* --- Button Styling --- */

        button {
            padding: 12px 25px;
            background-color: var(--ui-accent);
            color: var(--text-light);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--sea-blue-mid);
            transition: all 0.1s;
            font-weight: 700;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background-color: #ff5769;
        }

        button:active:not(:disabled) {
            box-shadow: 0 2px 0 var(--sea-blue-mid);
            transform: translateY(4px);
        }
        
        button#shop-button {
            background-color: #457b9d; /* Whale blue color */
            box-shadow: 0 6px 0 var(--sea-blue-dark);
        }
        button#shop-button:hover {
            background-color: #5a91b4;
        }
        
        button#reset-points-button {
            background-color: #777;
            box-shadow: 0 4px 0 #444;
            font-size: 0.9rem;
            padding: 8px 15px;
            margin-top: 15px;
        }
        button#reset-points-button:hover {
            background-color: #888;
        }
        button#reset-points-button:active {
            box-shadow: 0 1px 0 #444;
            transform: translateY(3px);
        }

        /* Shop specific buttons */
        .buy-button {
            background-color: var(--buy-color);
            box-shadow: 0 6px 0 #2e7d32;
        }
        .buy-button:hover:not(:disabled) {
            background-color: #66BB6A;
        }

        .buy-button:disabled {
            background-color: var(--max-level-color);
            color: #aaa;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* --- Shop Content Styling --- */
        #shop-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .shop-item {
            background-color: rgba(69, 123, 157, 0.2);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--whale-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            gap: 15px;
        }

        .item-details {
            flex-grow: 1;
        }

        .item-details h3 {
            margin-top: 0;
            margin-bottom: 5px;
            color: var(--text-light);
            font-size: 1.4rem;
        }

        .item-details p {
            margin: 0;
            font-size: 0.9rem;
            color: #ccc;
        }

        .item-status {
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .item-level {
            font-weight: 700;
            color: var(--flare-orange);
        }
        
        .cost-display {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--coin-color);
            font-weight: 700;
        }

        /* Heart display */
        #health-display {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 1.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .heart {
            display: inline-block;
            color: var(--ui-accent);
            margin-right: 5px;
            transition: transform 0.1s;
        }
        
        .empty-heart {
            color: var(--max-level-color);
        }

        /* Responsive adjustments */
        @media (max-width: 650px) {
            #game-container {
                height: 350px;
            }
            #score-display {
                font-size: 1.4rem;
                top: 10px;
            }
            #final-score {
                font-size: 2.5rem;
            }
            #message-box, #shop-modal {
                padding: 25px;
            }
            .shop-item {
                flex-direction: column;
                align-items: stretch;
            }
            .item-status {
                align-items: stretch;
            }
            .item-status button {
                width: 100%;
            }
            #top-ui-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h1>Whale Defender: Deep Dive</h1>

    <div id="top-ui-controls">
        <div id="total-score-container">
            <!-- Coin Icon (SVG/Emoji) -->
            <span class="coin-icon">💰</span> 
            <div id="total-score-display">0</div>
        </div>
        <button id="shop-button">Shop</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="health-display"></div>
            <div id="score-display">Flares Dodged: 0</div>

            <div id="message-box">
                <!-- Content injected by JS --></div>
        </div>
    </div>
    
    <div id="shop-modal">
        <h2>Deep Sea Upgrades</h2>
        <p style="color: var(--flare-orange);">Spend your Total Points to enhance the whale's survival!</p>
        <div id="shop-total-points-display" style="font-weight: bold; margin: 10px 0;"></div>
        <div id="shop-content">
            <!-- Items rendered here -->
        </div>
        <button id="close-shop-button" style="margin-top: 25px; background-color: var(--sea-blue-mid);">Continue Dive</button>
        <button id="reset-points-button">Reset Points (Testing)</button>
    </div>

    <p style="margin-top: 15px;">**Controls:** Use Arrow Keys to move the whale!</p>
    <p style="margin-top: 5px; font-size: 0.85rem; color: #aaa;">(The deeper you dive, the safer you are from the surface threats.)</p>

    <script>
        // --- Game Setup & Constants ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const healthDisplay = document.getElementById('health-display');
        const messageBox = document.getElementById('message-box');
        const shopModal = document.getElementById('shop-modal');
        const totalScoreDisplay = document.getElementById('total-score-display'); 
        const shopTotalPointsDisplay = document.getElementById('shop-total-points-display');
        const shopContent = document.getElementById('shop-content');
        const shopButton = document.getElementById('shop-button');
        const closeShopButton = document.getElementById('close-shop-button');
        const resetPointsButton = document.getElementById('reset-points-button'); // NEW

        let keys = {};
        let gameLoopId;
        let score = 0;
        let isGameOver = true;
        let whaleHit = false; 
        let flareSpeed = 4;
        const VIEWPORT_MARGIN = 200; 
        
        // --- World and Wave Constants ---
        const surfaceWorldY = -150; 
        const waveAmplitude = 18; 
        const waveLength = 80;
        let waveOffset = 0; 
        const DODGE_DEPTH = 600; 
        
        // --- WORLD BOUNDARIES ---
        const WORLD_WIDTH = 3000; 
        const WORLD_DEPTH = 1500; 
        const WORLD_LEFT = -WORLD_WIDTH / 2;
        const WORLD_RIGHT = WORLD_WIDTH / 2;
        const WORLD_BOTTOM = surfaceWorldY + WORLD_DEPTH;

        // --- UPGRADE STATE ---
        let totalPoints = 0;
        let playerUpgrades = {
            maxHits: 1, // Base health
            moveStep: 8, // Base speed
            scoreBonus: 0 // Base score bonus (multiplier value)
        };

        const SHOP_ITEMS = {
            'health_upgrade': {
                name: "Husk Strength",
                description: "Increases max hits by 1. Dive deeper, endure more!",
                cost: [5, 10, 20], // Costs for L1, L2, L3
                stat: 'maxHits',
                maxLevel: 3,
                baseValue: 1,
                increment: 1,
                currentLevel: 0 
            },
            'speed_upgrade': {
                name: "Hydrodynamic Boost",
                description: "Increases movement speed by 2. Dodge flares faster!",
                cost: [8, 16, 32, 64, 128],
                stat: 'moveStep',
                maxLevel: 5,
                baseValue: 8,
                increment: 2,
                currentLevel: 0
            },
            'score_multiplier': {
                name: "Deep Sea Compass",
                description: "Grants +1 score per dodged flare. Maximize earnings!",
                cost: [10, 20, 35, 55, 80],
                stat: 'scoreBonus',
                maxLevel: 5,
                baseValue: 0,
                increment: 1,
                currentLevel: 0
            }
        };

        // Utility function to safely get CSS variables in JavaScript
        const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

        // Whale object now tracks its absolute world position and health
        const whale = {
            worldX: 0,
            worldY: 0,
            radius: 25, 
            moveStep: 0, // Will be set by upgrades
            currentHits: 0, // Will be set by upgrades
            maxHits: 0, // Will be set by upgrades
            screenX: 0, 
            screenY: 0, 
            
            // Collision box offsets based on the drawn shape
            COLLISION_OFFSET_LEFT: -114, 
            COLLISION_OFFSET_RIGHT: 31,

            draw: function() {
                // Flash red when hit
                const whaleColor = whaleHit && frameCount % 10 < 5 ? getCssVar('--ui-accent') : getCssVar('--whale-color'); 
                const whaleColorDark = getCssVar('--whale-color-dark');
                const centerX = this.screenX;
                const centerY = this.screenY + Math.sin(frameCount * 0.05) * 2; 
                
                // Whale dimensions
                const bodyWidth = this.radius * 2.5;
                const bodyHeight = this.radius; 
                const noseX = centerX + bodyWidth / 2;
                const tailX = centerX - bodyWidth * 1.5;

                const drawWhaleBodyPath = () => {
                    ctx.beginPath();
                    ctx.moveTo(noseX, centerY);
                    ctx.bezierCurveTo(
                        centerX + bodyWidth * 0.4, centerY - bodyHeight * 1.2, 
                        centerX - bodyWidth * 0.9, centerY - bodyHeight * 0.8, 
                        tailX, centerY 
                    );
                    ctx.bezierCurveTo(
                        centerX - bodyWidth * 0.9, centerY + bodyHeight * 0.8, 
                        centerX + bodyWidth * 0.4, centerY + bodyHeight * 1.2, 
                        noseX, centerY 
                    );
                    ctx.closePath();
                };

                drawWhaleBodyPath();
                const gradient = ctx.createLinearGradient(centerX - bodyWidth, centerY - bodyHeight, centerX + bodyWidth, centerY + bodyHeight);
                gradient.addColorStop(0, whaleColorDark);
                gradient.addColorStop(0.5, whaleColor);
                gradient.addColorStop(1, whaleColorDark);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)'; 
                ctx.lineWidth = 2;
                drawWhaleBodyPath();
                ctx.stroke();

                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + Math.sin(frameCount * 0.08) * 0.05})`; 
                ctx.beginPath();
                ctx.ellipse(centerX + bodyWidth * 0.2, centerY - bodyHeight * 0.6, bodyWidth * 0.3, bodyHeight * 0.1, -Math.PI / 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';


                ctx.fillStyle = whaleColorDark;
                ctx.beginPath();
                ctx.moveTo(tailX, centerY);
                const flicker = Math.sin(frameCount * 0.3) * 5; 
                ctx.lineTo(tailX - 25, centerY - 18 + flicker); 
                ctx.lineTo(tailX - 25, centerY + 18 - flicker); 
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = whaleColorDark;
                ctx.beginPath();
                ctx.moveTo(centerX - bodyWidth * 0.4, centerY - bodyHeight * 0.8);
                ctx.quadraticCurveTo(
                    centerX - bodyWidth * 0.3, centerY - bodyHeight * 1.2,
                    centerX - bodyWidth * 0.2, centerY - bodyHeight * 0.8
                );
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = whaleColorDark;
                ctx.beginPath();
                ctx.ellipse(centerX - bodyWidth * 0.1, centerY + bodyHeight * 0.6, bodyWidth * 0.3, bodyHeight * 0.2, Math.PI / 6, 0, Math.PI * 2);
                ctx.fill();

                const eyeX = centerX + bodyWidth * 0.3;
                const eyeY = centerY - bodyHeight * 0.4;

                ctx.fillStyle = getCssVar('--text-light');
                ctx.beginPath();
                ctx.arc(eyeX, eyeY, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(eyeX + 1, eyeY, 3, 0, Math.PI * 2); 
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(eyeX + 2, eyeY - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            },
            update: function() {
                // Use upgraded moveStep
                if (keys['ArrowLeft'] || keys['KeyA']) {
                    this.worldX -= playerUpgrades.moveStep;
                }
                if (keys['ArrowRight'] || keys['KeyD']) {
                    this.worldX += playerUpgrades.moveStep;
                }
                if (keys['ArrowUp'] || keys['KeyW']) {
                    this.worldY -= playerUpgrades.moveStep;
                }
                if (keys['ArrowDown'] || keys['KeyS']) {
                    this.worldY += playerUpgrades.moveStep;
                }
                
                const boundRadius = this.radius * 1.5; 
                this.worldX = Math.max(WORLD_LEFT + boundRadius, 
                                       Math.min(WORLD_RIGHT - boundRadius, this.worldX));
                this.worldY = Math.max(surfaceWorldY + this.radius * 0.6, this.worldY);
                this.worldY = Math.min(WORLD_BOTTOM - boundRadius, this.worldY);
            }
        };

        let bubbles = [];

        function generateBubbles() {
            bubbles = []; 
            const bubbleAreaWidth = WORLD_RIGHT - WORLD_LEFT;
            const bubbleAreaHeight = WORLD_BOTTOM - surfaceWorldY;
            
            for(let i = 0; i < 300; i++) { 
                const parallax = Math.random() * 0.6 + 0.2; 
                const scale = parallax / 0.8; 

                bubbles.push({
                    worldX: WORLD_LEFT + Math.random() * bubbleAreaWidth, 
                    worldY: surfaceWorldY + Math.random() * bubbleAreaHeight, 
                    radius: (Math.random() * 4 + 1) * scale, 
                    opacity: (Math.random() * 0.3 + 0.05) * scale, 
                    speedY: (Math.random() * 0.5 + 0.1) * scale, 
                    life: Math.random() * 100,
                    parallax: parallax 
                });
            }
        }
        
        function drawBubbles() {
            bubbles.forEach(b => {
                b.worldY -= b.speedY * 0.1; 

                if (b.worldY < surfaceWorldY) {
                    b.worldY = WORLD_BOTTOM;
                }

                const screenX = (b.worldX - whale.worldX) * b.parallax + whale.screenX;
                const screenY = (b.worldY - whale.worldY) * b.parallax + whale.screenY;

                if (screenX > -b.radius && screenX < canvas.width + b.radius &&
                    screenY > -b.radius && screenY < canvas.height + b.radius) {
                    
                    const shimmer = Math.sin(b.life + frameCount * 0.03) * 0.1;
                    ctx.fillStyle = `rgba(241, 250, 238, ${b.opacity + shimmer})`;
                    
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, b.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        function drawCaustics() {
            const viewportWorldY = whale.worldY - whale.screenY;
            const waveScreenY = surfaceWorldY - viewportWorldY;

            if (waveScreenY > canvas.height + 50) return; 

            const depthLimit = Math.min(canvas.height, waveScreenY + 500);

            for (let i = 0; i < 6; i++) { 
                ctx.beginPath();
                const startX = (i * 150 + frameCount * 2.5) % (canvas.width * 3) - canvas.width * 1.5; 

                for (let x = 0; x < canvas.width; x += 15) {
                    const noise = Math.sin((x * 0.03) + frameCount * 0.005) * 50; 
                    const y1 = waveScreenY + x * 0.3 + noise; 

                    if (x === 0) {
                        ctx.moveTo(startX + x, y1);
                    } else {
                        ctx.lineTo(startX + x, y1);
                    }
                }
                
                ctx.lineTo(canvas.width + startX, depthLimit);
                ctx.lineTo(startX, depthLimit);
                ctx.closePath();

                const gradient = ctx.createLinearGradient(0, waveScreenY, 0, depthLimit);
                gradient.addColorStop(0, getCssVar('--caustics-light'));
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function drawSeaBackground() {
            const viewportWorldY = whale.worldY - whale.screenY;
            const waveScreenY = surfaceWorldY - viewportWorldY;
            
            const darkBlue = getCssVar('--sea-blue-dark');
            const midBlue = getCssVar('--sea-blue-mid');

            ctx.fillStyle = darkBlue;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gradient = ctx.createLinearGradient(0, waveScreenY, 0, canvas.height);
            gradient.addColorStop(0, midBlue); 
            gradient.addColorStop(1, darkBlue); 
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, Math.max(0, waveScreenY), canvas.width, canvas.height - Math.max(0, waveScreenY));

            drawCaustics();
        }

        function drawDepthHaze() {
            const maxDepth = WORLD_BOTTOM - surfaceWorldY;
            const currentDepth = whale.worldY - surfaceWorldY;
            const depthRatio = Math.min(1, currentDepth / maxDepth);
            
            const hazeOpacity = depthRatio * 0.4; 
            
            if (hazeOpacity > 0.01) {
                ctx.fillStyle = `rgba(0, 0, 0, ${hazeOpacity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function drawSky() {
            const viewportWorldY = whale.worldY - whale.screenY;
            const waveScreenY = surfaceWorldY - viewportWorldY;

            if (waveScreenY > 0) {
                ctx.fillStyle = getCssVar('--sky-blue');
                ctx.fillRect(0, 0, canvas.width, waveScreenY);
                ctx.strokeStyle = '#6d9aa3'; 
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, waveScreenY);
                ctx.lineTo(canvas.width, waveScreenY);
                ctx.stroke();
            }
        }
        
        function drawSeabed() {
            const parallax = 0.5; 
            const seabedScreenY = (WORLD_BOTTOM - whale.worldY) * parallax + whale.screenY;

            if (seabedScreenY < canvas.height) {
                ctx.fillStyle = getCssVar('--seabed-color'); 
                ctx.fillRect(0, seabedScreenY, canvas.width, canvas.height - seabedScreenY);

                ctx.fillStyle = '#4e3a47'; 
                const structures = [
                    { x: -500, w: 100, h: 40 }, { x: 100, w: 70, h: 30 }, 
                    { x: 700, w: 150, h: 60 }, { x: -100, w: 50, h: 20 },
                    { x: -1200, w: 200, h: 80 }
                ];

                structures.forEach(s => {
                    const screenX = (s.x - whale.worldX) * parallax + whale.screenX;
                    const screenY = seabedScreenY;
                    
                    const w = s.w * parallax;
                    const h = s.h * parallax;

                    ctx.beginPath();
                    ctx.moveTo(screenX, screenY);
                    ctx.quadraticCurveTo(screenX + w / 2, screenY - h, screenX + w, screenY);
                    ctx.lineTo(screenX + w, canvas.height);
                    ctx.lineTo(screenX, canvas.height);
                    ctx.closePath();
                    ctx.fill();
                });
            }
        }

        function drawWaves() {
            const viewportWorldY = whale.worldY - whale.screenY;
            const waveScreenY = surfaceWorldY - viewportWorldY;

            waveOffset += 0.05; 
            
            ctx.fillStyle = getCssVar('--sea-blue-mid');
            ctx.strokeStyle = getCssVar('--text-light');
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.moveTo(0, waveScreenY);

            const viewportWorldX = whale.worldX - whale.screenX;

            for (let x = 0; x <= canvas.width; x += 10) {
                const worldX = viewportWorldX + x;
                const y = waveScreenY + waveAmplitude * Math.sin((worldX + waveOffset * waveLength) / waveLength) + 
                          5 * Math.sin(worldX / 30); 
                ctx.lineTo(x, y);
            }

            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();
            ctx.globalAlpha = 0.5;
            ctx.fill();
            ctx.globalAlpha = 1.0;

            ctx.beginPath();
            ctx.moveTo(0, waveScreenY);
            for (let x = 0; x <= canvas.width; x += 10) {
                const worldX = viewportWorldX + x;
                const y = waveScreenY + waveAmplitude * Math.sin((worldX + waveOffset * waveLength) / waveLength) + 
                          5 * Math.sin(worldX / 30); 
                ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        let flares = [];
        const flareWidth = 25; 
        const flareHeight = 60;
        let frameCount = 0;
        let flareInterval = 20; 
        const TRAIL_MAX_AGE = 40; 
        const SPARK_MAX_AGE = 15; 

        function createFlare() {
            const worldX = WORLD_LEFT + flareWidth + Math.random() * (WORLD_RIGHT - WORLD_LEFT - 2 * flareWidth);
            const worldY = surfaceWorldY - 500; 

            flares.push({
                worldX: worldX,
                worldY: worldY, 
                width: flareWidth,
                height: flareHeight,
                scored: false,
                trail: [],
                sparks: [] 
            });
        }

        function drawFlareTrail(f) {
            f.trail.forEach(p => {
                const opacity = 1 - (p.age / TRAIL_MAX_AGE);
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.4})`; 
                ctx.beginPath();
                ctx.arc(p.screenX, p.screenY, p.radius * opacity, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawFlareSparks(f) {
            ctx.globalCompositeOperation = 'lighter'; 
            f.sparks.forEach(s => {
                const opacity = 1 - (s.age / SPARK_MAX_AGE);
                ctx.fillStyle = `rgba(255, 120, 0, ${opacity})`; 
                ctx.beginPath();
                ctx.arc(s.screenX, s.screenY, s.radius * opacity, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over'; 
        }

        function drawFlares() {
            const viewportWorldX = whale.worldX - whale.screenX;
            const viewportWorldY = whale.worldY - whale.screenY;

            flares.forEach(f => {
                const flareScreenX = f.worldX - viewportWorldX;
                const flareScreenY = f.worldY - viewportWorldY;

                f.trail.forEach(p => { 
                    p.screenX = p.worldX - viewportWorldX; 
                    p.screenY = p.worldY - viewportWorldY; 
                });
                f.sparks.forEach(s => { 
                    s.screenX = s.worldX - viewportWorldX; 
                    s.screenY = s.worldY - viewportWorldY; 
                });
                
                drawFlareTrail(f); 
                drawFlareSparks(f); 

                ctx.globalAlpha = 1.0;
                ctx.fillStyle = 'rgba(100, 30, 0, 0.8)'; 
                ctx.beginPath();
                ctx.moveTo(flareScreenX + f.width / 2, flareScreenY);
                ctx.lineTo(flareScreenX + f.width * 0.8, flareScreenY + f.height);
                ctx.lineTo(flareScreenX + f.width * 0.2, flareScreenY + f.height);
                ctx.closePath();
                ctx.fill();

                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = `rgba(255, 100, 0, 0.5)`; 
                ctx.beginPath();
                ctx.arc(flareScreenX + f.width / 2, flareScreenY + f.height * 0.5, f.width * 0.4, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalCompositeOperation = 'source-over'; 
            });
        }

        function updateFlares() {
            flareSpeed = 4 + Math.floor(score / 10) * 0.5; 

            for (let i = flares.length - 1; i >= 0; i--) {
                let f = flares[i];
                
                f.worldY += flareSpeed;

                if (frameCount % 2 === 0) { 
                    f.trail.push({
                        worldX: f.worldX + f.width / 2 + (Math.random() - 0.5) * 8, 
                        worldY: f.worldY + f.height,
                        radius: Math.random() * 4 + 1.5,
                        age: 0
                    });
                }
                for (let j = f.trail.length - 1; j >= 0; j--) {
                    f.trail[j].age++;
                    f.trail[j].worldY -= 1.0; 
                    if (f.trail[j].age > TRAIL_MAX_AGE) {
                        f.trail.splice(j, 1);
                    }
                }
                
                if (frameCount % 1 === 0) { 
                    f.sparks.push({
                        worldX: f.worldX + f.width / 2 + (Math.random() - 0.5) * f.width,
                        worldY: f.worldY + f.height * 0.3 + (Math.random() - 0.5) * f.height * 0.6,
                        radius: Math.random() * 2 + 1,
                        age: 0,
                        speedX: (Math.random() - 0.5) * 1.5, 
                        speedY: (Math.random() - 1) * 2 
                    });
                }
                for (let j = f.sparks.length - 1; j >= 0; j--) {
                    f.sparks[j].age++;
                    f.sparks[j].worldX += f.sparks[j].speedX;
                    f.sparks[j].worldY += f.sparks[j].speedY;
                    if (f.sparks[j].age > SPARK_MAX_AGE) {
                        f.sparks.splice(j, 1);
                    }
                }
                
                // Collision Check (using the full bounding box)
                const whaleHitAreaTop = whale.screenY - whale.radius;
                const whaleHitAreaBottom = whale.screenY + whale.radius;
                const viewportWorldX = whale.worldX - whale.screenX;
                
                const screenX = f.worldX - viewportWorldX;
                const screenY = f.worldY - (whale.worldY - whale.screenY); 

                if (screenY + f.height > whaleHitAreaTop && screenY < whaleHitAreaBottom) {
                    
                    const whaleLeft = whale.screenX + whale.COLLISION_OFFSET_LEFT;
                    const whaleRight = whale.screenX + whale.COLLISION_OFFSET_RIGHT;

                    if (screenX < whaleRight && screenX + f.width > whaleLeft) {
                        handleCollision(); 
                        return; 
                    }
                }

                if (!f.scored && f.worldY > surfaceWorldY + DODGE_DEPTH) {
                    // Apply score bonus here
                    score += (1 + playerUpgrades.scoreBonus); 
                    f.scored = true;
                    scoreDisplay.textContent = `Flares Dodged: ${score}`;
                }
                
                const horizontalCull = Math.abs(f.worldX - whale.worldX) > canvas.width / 2 + VIEWPORT_MARGIN;
                const verticalCull = f.worldY > whale.worldY + VIEWPORT_MARGIN * 2; 
                
                if (horizontalCull || verticalCull) {
                    flares.splice(i, 1);
                }
            }

            frameCount++;
            if (frameCount % flareInterval === 0) {
                createFlare();
            }
        }

        function drawHealth() {
            let html = '';
            for (let i = 0; i < whale.maxHits; i++) {
                if (i < whale.currentHits) {
                    // Full Heart (Whale has hit remaining)
                    html += '<span class="heart">♥</span>';
                } else {
                    // Empty Heart (Lost health)
                    html += '<span class="heart empty-heart">♡</span>';
                }
            }
            healthDisplay.innerHTML = html;
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            whale.screenX = canvas.width / 2;
            whale.screenY = canvas.height / 2;

            if (isGameOver) {
                 whale.draw();
            }
        }
        window.addEventListener('resize', resizeCanvas);


        function gameLoop() {
            if (isGameOver && !whaleHit) { 
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height); 

            drawSky();             
            drawSeaBackground();   
            
            if (!isGameOver) { 
                whale.update();
                updateFlares();
                drawHealth();
            }
            
            drawBubbles();          
            drawSeabed();           
            drawWaves();            
            drawFlares();
            whale.draw(); 
            
            drawDepthHaze();

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (!isGameOver) return;

            isGameOver = false;
            whaleHit = false; 
            score = 0;
            whale.worldX = 0; 
            whale.worldY = 0; 
            flares = [];
            frameCount = 0;
            flareSpeed = 4;
            
            // Set whale health based on current maxHits upgrade
            whale.maxHits = playerUpgrades.maxHits;
            whale.currentHits = whale.maxHits; 
            whale.moveStep = playerUpgrades.moveStep; // Apply speed upgrade

            scoreDisplay.textContent = `Flares Dodged: ${score}`;
            messageBox.classList.remove('visible');

            generateBubbles(); 

            gameLoop();
        }

        let isInvulnerable = false; // Prevents spam damage during hit animation

        function handleCollision() { 
            if (isGameOver || isInvulnerable) return;

            whale.currentHits--; 
            whaleHit = true; 
            isInvulnerable = true; 
            drawHealth(); // Update health display immediately

            if (whale.currentHits <= 0) {
                // Actual Game Over
                isGameOver = true; 
                
                setTimeout(() => {
                    cancelAnimationFrame(gameLoopId);

                    // Add score to total points
                    let currentTotal = parseInt(localStorage.getItem('whaleDefenderTotalScore') || 0, 10);
                    currentTotal += score; 
                    totalPoints = currentTotal; // Update in-memory state
                    localStorage.setItem('whaleDefenderTotalScore', totalPoints);
                    totalScoreDisplay.textContent = totalPoints; // Updated to just show number

                    messageBox.innerHTML = `
                        <h2>Whale Struck!</h2>
                        <p>A burning flare finally breached the whale's defenses. Game Over!</p>
                        <div id="final-score">Score: ${score}</div>
                        <button id="restart-button-modal">Start New Dive</button>
                    `;
                    document.getElementById('restart-button-modal').addEventListener('click', startGame);
                    messageBox.classList.add('visible');
                    whaleHit = false; 
                    isInvulnerable = false;
                }, 250); 

            } else {
                // Whale took damage but survived
                // Set brief invulnerability/flash
                setTimeout(() => {
                    whaleHit = false; 
                }, 500); 
                setTimeout(() => {
                    isInvulnerable = false;
                }, 1000); // 1 second invulnerability
            }
        }
        
        // --- SHOP & STORAGE LOGIC ---

        function loadUpgradesAndTotalScore() {
            // Load Total Points
            totalPoints = parseInt(localStorage.getItem('whaleDefenderTotalScore') || 0, 10);
            totalScoreDisplay.textContent = totalPoints;
            
            // Load Upgrades
            const savedUpgrades = JSON.parse(localStorage.getItem('whaleDefenderUpgrades') || '{}');
            
            // Apply loaded levels to SHOP_ITEMS and calculate final playerUpgrades
            for (const key in SHOP_ITEMS) {
                const item = SHOP_ITEMS[key];
                const level = savedUpgrades[key] || 0;
                item.currentLevel = level;
                
                // Calculate and apply stat
                playerUpgrades[item.stat] = item.baseValue + (level * item.increment);
            }
        }

        function saveUpgradesAndTotalScore() {
            localStorage.setItem('whaleDefenderTotalScore', totalPoints);
            const savedUpgrades = {};
            for (const key in SHOP_ITEMS) {
                savedUpgrades[key] = SHOP_ITEMS[key].currentLevel;
            }
            localStorage.setItem('whaleDefenderUpgrades', JSON.stringify(savedUpgrades));
        }

        function buyItem(itemId) {
            const item = SHOP_ITEMS[itemId];
            const currentLevel = item.currentLevel;
            
            if (currentLevel >= item.maxLevel) {
                console.log("Max level reached.");
                return;
            }

            const cost = item.cost[currentLevel];
            
            if (totalPoints >= cost) {
                totalPoints -= cost;
                item.currentLevel++;
                
                // Apply the new stat value
                playerUpgrades[item.stat] = item.baseValue + (item.currentLevel * item.increment);
                
                saveUpgradesAndTotalScore();
                renderShop(); // Re-render the shop with new data
                totalScoreDisplay.textContent = totalPoints; // Update outside display
            } else {
                console.log("Not enough points.");
            }
        }

        function renderShop() {
            shopTotalPointsDisplay.innerHTML = `Your Currency: <span class="coin-icon">💰</span> ${totalPoints}`;
            shopContent.innerHTML = ''; 

            for (const itemId in SHOP_ITEMS) {
                const item = SHOP_ITEMS[itemId];
                const currentLevel = item.currentLevel;
                const nextLevel = currentLevel + 1;
                const maxLevel = item.maxLevel;
                const isMax = currentLevel >= maxLevel;
                const cost = isMax ? 'MAX' : item.cost[currentLevel];
                const canAfford = totalPoints >= cost;
                
                let buttonText = isMax ? 'MAX LEVEL' : `BUY`;
                
                const costDisplayHtml = isMax ? '' : `<div class="cost-display"><span class="coin-icon" style="font-size: 1rem;">💰</span> ${cost}</div>`;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'shop-item';
                itemDiv.innerHTML = `
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p>Current: +${currentLevel * item.increment + item.baseValue - (item.stat === 'moveStep' ? 0 : item.baseValue)} ${item.stat === 'moveStep' ? 'Speed' : item.stat === 'maxHits' ? 'Health' : 'Score Bonus'}</p>
                        <p style="color: #66BB6A;">${item.description}</p>
                    </div>
                    <div class="item-status">
                        <div class="item-level">Level ${currentLevel}/${maxLevel}</div>
                        ${costDisplayHtml}
                        <button 
                            id="buy-${itemId}" 
                            class="buy-button" 
                            ${isMax || !canAfford ? 'disabled' : ''}>
                            ${buttonText}
                        </button>
                    </div>
                `;
                
                shopContent.appendChild(itemDiv);

                if (!isMax) {
                    document.getElementById(`buy-${itemId}`).addEventListener('click', () => buyItem(itemId));
                }
            }
        }
        
        function openShop() {
            // Allow shop access even if game is not strictly "over" but paused
            if (!isGameOver) {
                // If game is running, briefly stop animation and show a warning
                cancelAnimationFrame(gameLoopId);
                messageBox.innerHTML = `
                    <h2>Pause!</h2>
                    <p>Diving is dangerous. Resume the game to continue earning points!</p>
                    <button id="resume-button-modal" style="background-color: var(--buy-color);">Resume Dive</button>
                `;
                document.getElementById('resume-button-modal').addEventListener('click', () => {
                    messageBox.classList.remove('visible');
                    gameLoop();
                });
                messageBox.classList.add('visible');
                // The shop should still open on top
            }
            renderShop();
            shopModal.classList.add('visible');
        }
        
        function closeShop() {
            shopModal.classList.remove('visible');
            // If game was paused for shop, it should resume via button. If game was over, it stays over.
        }
        
        // Custom modal to avoid alert()
        function showResetConfirmation() {
            // Create a temporary confirmation modal element
            const confirmModal = document.createElement('div');
            confirmModal.style.position = 'fixed';
            confirmModal.style.top = '50%';
            confirmModal.style.left = '50%';
            confirmModal.style.transform = 'translate(-50%, -50%)';
            confirmModal.style.backgroundColor = 'rgba(0, 0, 0, 0.98)';
            confirmModal.style.padding = '30px';
            confirmModal.style.borderRadius = '15px';
            confirmModal.style.zIndex = '100';
            confirmModal.style.color = 'white';
            confirmModal.style.textAlign = 'center';
            confirmModal.style.border = '2px solid var(--ui-accent)';
            confirmModal.style.boxShadow = '0 0 20px rgba(230, 57, 70, 0.8)';

            confirmModal.innerHTML = `
                <p style="margin-top: 0; font-size: 1.2rem;">Are you sure you want to reset your total points and all upgrades?</p>
                <div style="margin-top: 20px;">
                    <button id="confirm-yes" style="margin-right: 10px;">Yes, Reset Everything</button>
                    <button id="confirm-no" style="background-color: var(--sea-blue-mid);">No, Keep Playing</button>
                </div>
            `;
            
            // Hide the shop modal temporarily
            shopModal.classList.remove('visible');
            document.body.appendChild(confirmModal);

            document.getElementById('confirm-yes').addEventListener('click', () => {
                // Reset Logic
                localStorage.setItem('whaleDefenderTotalScore', 0);
                localStorage.removeItem('whaleDefenderUpgrades');
                
                // Reload state and update UI
                loadUpgradesAndTotalScore(); 
                totalPoints = 0;
                
                // Close confirmation and reopen shop to show reset state
                document.body.removeChild(confirmModal);
                renderShop();
                shopModal.classList.add('visible');
            });

            document.getElementById('confirm-no').addEventListener('click', () => {
                document.body.removeChild(confirmModal);
                shopModal.classList.add('visible'); // Show shop again
            });
        }


        // --- Event Listeners and Initialization ---

        document.addEventListener('keydown', (e) => {
            // Only accept controls when game is not over AND shop/message is closed
            const isModalOpen = shopModal.classList.contains('visible') || messageBox.classList.contains('visible');
            if (isModalOpen && !isGameOver) return; // Allow interaction if game is paused/over

            if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown', 'KeyW', 'KeyS'].includes(e.code)) {
                keys[e.code] = true;
                e.preventDefault(); 
            }
            if (isGameOver && (e.code === 'Space' || e.code === 'Enter') && messageBox.classList.contains('visible')) {
                const startButton = document.getElementById('start-button') || document.getElementById('restart-button-modal');
                if (startButton) startButton.click();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown', 'KeyW', 'KeyS'].includes(e.code)) {
                keys[e.code] = false;
            }
        });

        const handleStartClick = () => { 
            if (isGameOver && !shopModal.classList.contains('visible')) startGame(); 
        };
        canvas.addEventListener('click', handleStartClick);
        canvas.addEventListener('touchstart', (e) => { 
            if (isGameOver && !shopModal.classList.contains('visible')) handleStartClick(); 
            e.preventDefault(); 
        });
        
        shopButton.addEventListener('click', openShop);
        closeShopButton.addEventListener('click', closeShop);
        resetPointsButton.addEventListener('click', showResetConfirmation); // NEW Listener

        window.onload = function() {
            loadUpgradesAndTotalScore();
            resizeCanvas(); 
            
            const maxHitsText = `${playerUpgrades.maxHits} hit${playerUpgrades.maxHits > 1 ? 's' : ''}`;
            
            messageBox.innerHTML = `
                <h2>Whale Defender: Deep Dive</h2>
                <p>Protect the whale from the burning flares dropped from the surface!</p>
                <p>The whale can take **${maxHitsText}** before the dive ends. Visit the shop to upgrade!</p>
                <p style="margin-top: 15px;">**Controls:** Use the **Arrow Keys** or **W/A/S/D** to move.</p>
                <p style="margin-top: 5px; color: ${getCssVar('--flare-orange')}">Current Danger: Avoid the light and dive deep!</p>
                <button id="start-button">Start Dive</button>
            `;
            const startButton = document.getElementById('start-button');
            startButton.addEventListener('click', startGame);
            messageBox.classList.add('visible');
            generateBubbles(); 
            whale.draw();
            drawHealth();
        }
    </script>
</body>
</html>
