<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Defender: Open World Dive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="whale game 1.1.css">
</head>
<body>

    <h1>Whale Defender: Open World Dive</h1>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="score-display">Flares Dodged: 0</div>

            <div id="message-box">
                <h2>Whale Struck!</h2>
                <p>A burning flare hit the poor whale.</p>
                <div id="final-score">Score: 0</div>
                <button id="restart-button">Start New Dive</button>
            </div>
        </div>
    </div>
    <p style="margin-top: 15px;">**Controls:** Press **Arrow Keys** or **W/A/S/D** to move!</p>
    <p style="margin-top: 5px; font-size: 0.85rem; color: #aaa;">(The world scrolls, and the waves roll above you!)</p>

    <script src="whale game 1.1.js"></script>
</body>
</html>
