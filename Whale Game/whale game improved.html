<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Defender: Open World Dive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Custom CSS for a deep-sea theme with a surface threat */
        :root {
            --sea-blue-dark: #001219;
            --sea-blue-mid: #1d3557;
            --flare-orange: #ff9900;
            --whale-color: #457b9d;
            --text-light: #f1faee;
            --ui-accent: #e63946;
            --seabed-color: #2a1a1f; /* New color for the ocean floor */
            --sky-blue: #8ecae6; /* NEW: Light blue for the sky/surface atmosphere */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--sea-blue-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            color: var(--text-light);
            text-shadow: 0 0 10px rgba(69, 123, 157, 0.5);
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid var(--sea-blue-mid);
        }

        canvas {
            display: block;
            /* REMOVED background gradient from CSS, now drawn in JS drawSeaBackground() */
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: 700;
            padding: 5px 15px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 153, 0, 0.8); /* Glowing flare effect */
            transition: opacity 0.3s ease;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            z-index: 10;
        }

        #message-box.visible {
            opacity: 1;
            visibility: visible;
        }

        #final-score {
            font-size: 2.5rem;
            color: var(--flare-orange);
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: var(--ui-accent);
            color: var(--text-light);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--sea-blue-dark);
            transition: all 0.1s;
            font-weight: 700;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #ff5769;
        }

        button:active {
            box-shadow: 0 2px 0 var(--sea-blue-dark);
            transform: translateY(2px);
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            #game-container {
                height: 350px;
            }
            #score-display {
                font-size: 1.2rem;
            }
            #final-score {
                font-size: 2rem;
            }
            #message-box {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <h1>Whale Defender: Open World Dive</h1>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="score-display">Flares Dodged: 0</div>

            <div id="message-box">
                <h2>Whale Struck!</h2>
                <p>A burning flare hit the poor whale.</p>
                <div id="final-score">Score: 0</div>
                <button id="restart-button">Start New Dive</button>
            </div>
        </div>
    </div>
    <p style="margin-top: 15px;">**Controls:** Press **Arrow Keys** or **W/A/S/D** to move!</p>
    <p style="margin-top: 5px; font-size: 0.85rem; color: #aaa;">(The world scrolls, and the waves roll above you!)</p>

    <script>
        // Game constants and state
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const messageBox = document.getElementById('message-box');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');

        // Input tracking for continuous movement
        let keys = {};
        
        let gameLoopId;
        let score = 0;
        let isGameOver = true;
        let whaleHit = false; // NEW: Visual cue for when the whale is struck
        let flareSpeed = 4;
        const VIEWPORT_MARGIN = 200; // Extra distance to keep objects in memory
        
        // --- World and Wave Constants ---
        const surfaceWorldY = -150; // World Y position of the water surface
        const waveAmplitude = 15;
        const waveLength = 60;
        let waveOffset = 0; 
        const DODGE_DEPTH = 600; // Flares must fall this far past the surface to be considered dodged
        
        // --- WORLD BOUNDARIES ---
        const WORLD_WIDTH = 3000; // Total horizontal distance
        const WORLD_DEPTH = 1200; // Depth below the surface (surfaceWorldY)
        const WORLD_LEFT = -WORLD_WIDTH / 2;
        const WORLD_RIGHT = WORLD_WIDTH / 2;
        const WORLD_BOTTOM = surfaceWorldY + WORLD_DEPTH;

        // Utility function to safely get CSS variables in JavaScript
        const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

        // Whale object now tracks its absolute world position
        const whale = {
            worldX: 0,
            worldY: 0,
            radius: 20,
            moveStep: 8,
            // Whale is always drawn at the center of the screen
            screenX: 0, 
            screenY: 0, 

            draw: function() {
                // Draw whale at its fixed screen position (center)
                // Flash red/accent color when hit, otherwise use the normal whale color
                ctx.fillStyle = whaleHit ? getCssVar('--ui-accent') : getCssVar('--whale-color'); 
                ctx.beginPath();
                ctx.arc(this.screenX, this.screenY, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Simple tail fin (triangle)
                ctx.fillStyle = getCssVar('--sea-blue-mid'); // Use mid-blue color for the tail
                ctx.beginPath();
                ctx.moveTo(this.screenX - this.radius, this.screenY);
                ctx.lineTo(this.screenX - this.radius - 15, this.screenY - 10);
                ctx.lineTo(this.screenX - this.radius - 15, this.screenY + 10);
                ctx.closePath();
                ctx.fill();

                // Eye (small white dot)
                // Eye disappears/changes on hit, otherwise use light text color
                ctx.fillStyle = whaleHit ? 'black' : getCssVar('--text-light');
                ctx.beginPath();
                ctx.arc(this.screenX + this.radius / 2, this.screenY - this.radius / 3, 3, 0, Math.PI * 2);
                ctx.fill();
            },
            update: function() {
                // Update whale's world position based on input
                if (keys['ArrowLeft'] || keys['KeyA']) {
                    this.worldX -= this.moveStep;
                }
                if (keys['ArrowRight'] || keys['KeyD']) {
                    this.worldX += this.moveStep;
                }
                if (keys['ArrowUp'] || keys['KeyW']) {
                    this.worldY -= this.moveStep;
                }
                if (keys['ArrowDown'] || keys['KeyS']) {
                    this.worldY += this.moveStep;
                }
                
                // --- ENFORCE WORLD BOUNDARIES ---
                
                // Horizontal Boundaries (left and right)
                this.worldX = Math.max(WORLD_LEFT + this.radius, 
                                       Math.min(WORLD_RIGHT - this.radius, this.worldX));

                // Vertical Boundaries (surface and bottom/seabed)
                // Upper bound: Whale center cannot go above the surface line.
                this.worldY = Math.max(surfaceWorldY, this.worldY);
                // Lower bound: Whale center cannot go below the seabed.
                this.worldY = Math.min(WORLD_BOTTOM - this.radius, this.worldY);
            }
        };

        // Background bubbles array to demonstrate scrolling
        let bubbles = [];

        function generateBubbles() {
            // Clear and regenerate bubbles to fit within the new bounded world
            bubbles = []; 
            const bubbleAreaWidth = WORLD_RIGHT - WORLD_LEFT;
            const bubbleAreaHeight = WORLD_BOTTOM - surfaceWorldY;
            
            for(let i = 0; i < 150; i++) { 
                bubbles.push({
                    // Constrain X position within WORLD_LEFT and WORLD_RIGHT
                    worldX: WORLD_LEFT + Math.random() * bubbleAreaWidth, 
                    // Constrain Y position from surfaceWorldY down to WORLD_BOTTOM
                    worldY: surfaceWorldY + Math.random() * bubbleAreaHeight, 
                    radius: Math.random() * 5 + 2, 
                    opacity: Math.random() * 0.4 + 0.1 
                });
            }
        }
        
        // Renamed and updated to use CSS variables
        function drawBubbles() {
            // Calculate the world coordinates of the viewport's top-left corner
            const viewportWorldX = whale.worldX - whale.screenX;
            const viewportWorldY = whale.worldY - whale.screenY;

            bubbles.forEach(b => {
                // Calculate screen position: object.world - viewport.world
                const screenX = b.worldX - viewportWorldX;
                const screenY = b.worldY - viewportWorldY;

                // Only draw if on screen (plus a margin)
                if (screenX > -b.radius && screenX < canvas.width + b.radius &&
                    screenY > -b.radius && screenY < canvas.height + b.radius) {
                    
                    // Using direct RGB for color calculation
                    ctx.fillStyle = `rgba(241, 250, 238, ${b.opacity})`;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, b.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        // Draws the deep sea gradient
        function drawSeaBackground() {
            const viewportWorldY = whale.worldY - whale.screenY;
            const waveScreenY = surfaceWorldY - viewportWorldY;

            // Draw the absolute bottom layer (Darkest Sea) to ensure background coverage
            ctx.fillStyle = getCssVar('--sea-blue-dark');
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw the Sea Gradient (Mid-Blue fading to Dark-Blue)
            const gradient = ctx.createLinearGradient(0, waveScreenY, 0, canvas.height);
            gradient.addColorStop(0, getCssVar('--sea-blue-mid')); 
            gradient.addColorStop(1, getCssVar('--sea-blue-dark')); 
            
            // Only draw the gradient from the surface line downwards
            ctx.fillStyle = gradient;
            ctx.fillRect(0, Math.max(0, waveScreenY), canvas.width, canvas.height - Math.max(0, waveScreenY));
        }

        // Draws the sky (atmosphere) layer
        function drawSky() {
            const viewportWorldY = whale.worldY - whale.screenY;
            const waveScreenY = surfaceWorldY - viewportWorldY;

            // Draw sky ONLY if the surface is visible (waveScreenY is within canvas bounds)
            if (waveScreenY > 0) {
                // Draw light hazy sky
                ctx.fillStyle = getCssVar('--sky-blue');
                ctx.fillRect(0, 0, canvas.width, waveScreenY);

                // Draw a subtle horizon line to separate the sky from the surface
                ctx.strokeStyle = '#a8dadc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, waveScreenY);
                ctx.lineTo(canvas.width, waveScreenY);
                ctx.stroke();
            }
        }
        
        // --- NEW SEABED DRAWING FUNCTION ---
        function drawSeabed() {
            const viewportWorldX = whale.worldX - whale.screenX;
            const viewportWorldY = whale.worldY - whale.screenY;

            // Calculate the screen Y position of the seabed line
            const seabedScreenY = WORLD_BOTTOM - viewportWorldY;

            // Only draw if the seabed is visible on screen
            if (seabedScreenY < canvas.height) {
                 // 1. Draw solid ground
                ctx.fillStyle = getCssVar('--seabed-color'); // Dark, earthy color for the bottom
                ctx.fillRect(0, seabedScreenY, canvas.width, canvas.height - seabedScreenY);

                // 2. Draw subtle ground texture/noise
                ctx.strokeStyle = '#4e3a47'; // Slightly lighter color for texture
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                // Draw short vertical lines for texture and show horizontal movement
                for (let x = 0; x < canvas.width; x += 30) {
                    const worldX = viewportWorldX + x;
                    // Add a slight noise function to the seabed line
                    const noise = Math.sin(worldX / 100) * 5; 
                    
                    ctx.moveTo(x, seabedScreenY + noise);
                    // Draw a short, random line segment up from the bottom
                    ctx.lineTo(x, seabedScreenY + noise + Math.random() * 8 + 5); 
                }
                ctx.stroke();
            }
        }

        // --- WAVE DRAWING FUNCTION (RE-ADDED) ---
        function drawWaves() {
            const viewportWorldY = whale.worldY - whale.screenY;
            const waveScreenY = surfaceWorldY - viewportWorldY;

            // Update wave movement
            waveOffset += 0.05; 
            
            ctx.fillStyle = getCssVar('--sea-blue-mid');
            ctx.strokeStyle = getCssVar('--text-light');
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.moveTo(0, waveScreenY);

            const viewportWorldX = whale.worldX - whale.screenX;

            for (let x = 0; x <= canvas.width; x += 10) {
                // Calculate world X for wave
                const worldX = viewportWorldX + x;
                // Sine wave calculation
                const y = waveScreenY + waveAmplitude * Math.sin((worldX + waveOffset * waveLength) / waveLength);
                ctx.lineTo(x, y);
            }

            // Close the path to fill the area under the waves
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();

            // Fill the area below the wave line with a slight transparency to distinguish it from the background gradient
            ctx.globalAlpha = 0.5;
            ctx.fill();
            ctx.globalAlpha = 1.0;

            // Redraw the main wave line on top
            ctx.beginPath();
            ctx.moveTo(0, waveScreenY);
            for (let x = 0; x <= canvas.width; x += 10) {
                const worldX = viewportWorldX + x;
                const y = waveScreenY + waveAmplitude * Math.sin((worldX + waveOffset * waveLength) / waveLength);
                ctx.lineTo(x, y);
            }
            ctx.stroke();
        }


        // Flare object array
        let flares = [];
        // Flare dimensions
        const flareWidth = 25; 
        const flareHeight = 60;
        let frameCount = 0;
        // Flare frequency
        let flareInterval = 20; 

        function createFlare() {
            // Generate a flare with a worldX position CONSTRAINED by WORLD_LEFT/RIGHT
            const worldX = WORLD_LEFT + flareWidth + Math.random() * (WORLD_RIGHT - WORLD_LEFT - 2 * flareWidth);
            
            // World Y position is now far above the surface Y to fall from the sky
            const worldY = surfaceWorldY - 500; 

            flares.push({
                worldX: worldX,
                worldY: worldY, 
                width: flareWidth,
                height: flareHeight,
                scored: false
            });
        }

        function drawFlares() {
            // Calculate the world coordinates of the viewport's top-left corner
            const viewportWorldX = whale.worldX - whale.screenX;
            const viewportWorldY = whale.worldY - whale.screenY;

            flares.forEach(f => {
                // Calculate screen position
                const screenX = f.worldX - viewportWorldX;
                const screenY = f.worldY - viewportWorldY;

                // Draw Flare (Orange/Red Fire)
                ctx.fillStyle = '#ff9900';
                ctx.beginPath();
                ctx.moveTo(screenX + f.width / 2, screenY);
                ctx.lineTo(screenX + f.width, screenY + f.height);
                ctx.lineTo(screenX, screenY + f.height);
                ctx.closePath();
                ctx.fill();

                // Add a bright yellow glow/center
                ctx.fillStyle = 'rgba(255, 255, 0, 0.7)';
                ctx.beginPath();
                // Adjust glow position based on new height
                ctx.arc(screenX + f.width/2, screenY + f.height * 0.4, 8, 0, Math.PI * 2); 
                ctx.fill();
            });
        }

        function updateFlares() {
            flareSpeed = 4 + Math.floor(score / 10) * 0.5; // Gradually increase speed

            for (let i = flares.length - 1; i >= 0; i--) {
                let f = flares[i];
                
                // 1. Flares always fall down in world Y space
                f.worldY += flareSpeed;

                // 2. Determine screen position for collision and culling
                const viewportWorldX = whale.worldX - whale.screenX;
                const viewportWorldY = whale.worldY - whale.screenY;
                const screenX = f.worldX - viewportWorldX;
                const screenY = f.worldY - viewportWorldY;

                // 3. Check for scoring (flare passes far below the surface)
                if (!f.scored && f.worldY > surfaceWorldY + DODGE_DEPTH) {
                    score++;
                    f.scored = true;
                    scoreDisplay.textContent = `Flares Dodged: ${score}`;
                }

                // 4. Collision Check (Screen coordinates for simplicity) - Game over on touch.
                // Collision is between the flare's bounding box and the whale's bounding box.
                const whaleHitAreaTop = whale.screenY - whale.radius;
                const whaleHitAreaBottom = whale.screenY + whale.radius;

                if (screenY + f.height > whaleHitAreaTop && screenY < whaleHitAreaBottom) {
                    // Check horizontal overlap
                    if (screenX < whale.screenX + whale.radius && screenX + f.width > whale.screenX - whale.radius) {
                        handleCollision(); // <-- CALLS THE NEW COLLISION HANDLER
                        return; // Exit loop immediately on game over
                    }
                }

                // 5. Culling (Remove flares that are far away from the viewport)
                const horizontalCull = Math.abs(f.worldX - whale.worldX) > canvas.width / 2 + VIEWPORT_MARGIN;
                // Only cull if it's far below the whale's current worldY
                const verticalCull = f.worldY > whale.worldY + VIEWPORT_MARGIN * 2; 
                
                if (horizontalCull || verticalCull) {
                    flares.splice(i, 1);
                }
            }

            // Generate new flare
            frameCount++;
            if (frameCount % flareInterval === 0) {
                createFlare();
            }
        }

        // Initial sizing for responsiveness
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            // Set whale's fixed screen position (center of canvas)
            whale.screenX = canvas.width / 2;
            whale.screenY = canvas.height / 2;

            // In game over state, re-draw the whale in the center
            if (isGameOver) {
                 whale.draw();
            }
        }
        window.addEventListener('resize', resizeCanvas);


        // Main game loop
        function gameLoop() {
            if (isGameOver && !whaleHit) { // Only return if game is over AND the hit flash has finished
                return;
            }

            // 1. Clear & Background Layers (Crucial Order for Sky/Sea)
            ctx.clearRect(0, 0, canvas.width, canvas.height); 

            drawSky();             // Draw the sky atmosphere (NEW)
            drawSeaBackground();   // Draw the deep sea gradient (NEW)
            
            // 2. Update and Draw World Elements
            if (!isGameOver) { // Only update if not game over
                whale.update();
                updateFlares();
            }
            
            drawBubbles();          // Bubbles
            drawSeabed();           // Seabed (on top of the deep sea gradient)
            drawWaves();            // Waves (light surface fill and line, on top of sky/sea border)
            drawFlares();
            whale.draw(); // Draw whale fixed in the center

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (!isGameOver) return;

            isGameOver = false;
            whaleHit = false; // Reset hit state
            score = 0;
            // Reset world position to center of the defined world
            whale.worldX = 0; 
            whale.worldY = 0; 
            flares = [];
            frameCount = 0;
            flareSpeed = 4;

            scoreDisplay.textContent = `Flares Dodged: ${score}`;
            messageBox.classList.remove('visible');

            // Regenerate bubbles to fit the new bounded world
            generateBubbles();

            gameLoop();
        }

        function handleCollision() { // MODIFIED: Renamed from gameOver to handleCollision
            if (isGameOver) return;

            // 1. Mark as game over and trigger visual flash
            isGameOver = true; 
            whaleHit = true;

            // 2. Allow the next draw cycle to render the red whale, then stop the loop and show the UI
            setTimeout(() => {
                cancelAnimationFrame(gameLoopId);

                // Update the message box content and visibility
                finalScoreDisplay.innerHTML = `Flares Dodged: ${score}`;
                messageBox.querySelector('h2').textContent = "Whale Struck!";
                messageBox.querySelector('p').textContent = "A burning flare hit the poor whale. Game Over!";
                messageBox.classList.add('visible');
                whaleHit = false; // Reset for potential restart
            }, 250); // Flash for 250ms
        }

        // Input Handlers
        document.addEventListener('keydown', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown', 'KeyW', 'KeyS'].includes(e.code)) {
                keys[e.code] = true;
                e.preventDefault(); 
            }
            if (isGameOver && (e.code === 'Space' || e.code === 'Enter')) {
                startGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown', 'KeyW', 'KeyS'].includes(e.code)) {
                keys[e.code] = false;
            }
        });

        // Touch/Click for starting the game
        canvas.addEventListener('click', () => { if (isGameOver) startGame(); });
        canvas.addEventListener('touchstart', () => { if (isGameOver) startGame(); });
        restartButton.addEventListener('click', startGame);

        // Run initial setup after everything loads
        window.onload = function() {
            resizeCanvas(); 
            // Show the initial "Game Over" box as an instruction screen
            messageBox.innerHTML = `
                <h2>Open World Dive! (Extreme)</h2>
                <p>Flares are now bigger and drop much faster! Can you survive the intensity?</p>
                <p style="margin-top: 15px;">**Controls:** Use the **Arrow Keys** or **W/A/S/D**.</p>
                <button id="start-button">Start Dive</button>
            `;
            const startButton = document.getElementById('start-button');
            startButton.addEventListener('click', startGame);
            messageBox.classList.add('visible');
            generateBubbles(); // Generate bubbles for the first time
            whale.draw(); 
        }
    </script>
</body>
</html>
